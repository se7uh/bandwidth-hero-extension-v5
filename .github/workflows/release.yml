name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Check version consistency
        id: version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          MANIFEST_VERSION=$(node -p "require('./src/manifest.json').version")

          echo "package.json version: $PKG_VERSION"
          echo "manifest.json version: $MANIFEST_VERSION"

          if [ "$PKG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "ERROR: Version mismatch — package.json ($PKG_VERSION) != manifest.json ($MANIFEST_VERSION)"
            exit 1
          fi

          echo "version=$PKG_VERSION" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Chromium
        run: pnpm run build

      - name: Build Firefox
        run: pnpm exec extension build --browser=firefox

      - name: Install Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub \
            | sudo gpg --dearmor -o /usr/share/keyrings/google-chrome.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] \
            http://dl.google.com/linux/chrome/deb/ stable main" \
            | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update && sudo apt-get install -y google-chrome-stable

      - name: Write private key
        run: echo "${{ secrets.CHROME_CRX_PRIVATE_KEY }}" > key.pem

      - name: Pack CRX
        run: |
          google-chrome \
            --pack-extension=./dist/chromium \
            --pack-extension-key=key.pem \
            --no-message-box
          mv dist/chromium.crx bandwidth-hero-v${{ steps.version.outputs.version }}.crx

      - name: Remove private key
        if: always()
        run: rm -f key.pem

      - name: Zip Chromium build
        run: |
          cd dist/chromium
          zip -r ../../bandwidth-hero-chromium-v${{ steps.version.outputs.version }}.zip .

      - name: Zip Firefox build
        run: |
          cd dist/firefox
          zip -r ../../bandwidth-hero-firefox-v${{ steps.version.outputs.version }}.zip .

      - name: Upload Chromium artifact
        uses: actions/upload-artifact@v4
        with:
          name: bandwidth-hero-chromium-v${{ steps.version.outputs.version }}
          path: bandwidth-hero-chromium-v${{ steps.version.outputs.version }}.zip

      - name: Upload Firefox artifact
        uses: actions/upload-artifact@v4
        with:
          name: bandwidth-hero-firefox-v${{ steps.version.outputs.version }}
          path: bandwidth-hero-firefox-v${{ steps.version.outputs.version }}.zip

      - name: Zip CRX
        run: |
          zip bandwidth-hero-crx-v${{ steps.version.outputs.version }}.zip \
            bandwidth-hero-v${{ steps.version.outputs.version }}.crx

      - name: Upload CRX artifact
        uses: actions/upload-artifact@v4
        with:
          name: bandwidth-hero-crx-v${{ steps.version.outputs.version }}
          path: bandwidth-hero-crx-v${{ steps.version.outputs.version }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            bandwidth-hero-crx-v${{ steps.version.outputs.version }}.zip
            bandwidth-hero-chromium-v${{ steps.version.outputs.version }}.zip
            bandwidth-hero-firefox-v${{ steps.version.outputs.version }}.zip
